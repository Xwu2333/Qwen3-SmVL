train_data: "all"
seed: 42
data_seed: 42
num_train_epochs: 1
per_device_train_batch_size: 2
gradient_accumulation_steps: 8
dataloader_pin_memory: False
warmup_ratio: 0.1
# 全局学习率（LR调度器基准值 / 后备默认值）
learning_rate: 0.00002
# 分组学习率：设为 0 则冻结该组件
vision_tower_lr: 0.000005     # 5e-6，视觉编码器使用最低学习率（已充分预训练）
connector_lr: 0.0001          # 1e-4，连接器使用最高学习率（预训练最少）
language_model_lr: 0.00002    # 2e-5，语言模型使用中等学习率
lr_scheduler_type: "cosine"
weight_decay: 0.01
logging_steps: 5
eval_strategy: "steps"
eval_steps: 50
save_strategy: "steps"
save_steps: 100
save_total_limit: 8
optim: "adamw_torch"
bf16: True
output_dir: "./model/freeze_llm_vlm_fulldata"
overwrite_output_dir: False
report_to: "swanlab"
run_name: "freeze_llm_vlm_fulldata"
remove_unused_columns: False
gradient_checkpointing: False